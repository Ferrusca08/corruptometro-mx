    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #06090F;
            --bg-card: #0D1117;
            --bg-card-hover: #151B23;
            --bg-elevated: #1C2333;
            --border: #21262D;
            --border-highlight: #30363D;
            --text-primary: #E6EDF3;
            --text-secondary: #8B949E;
            --text-muted: #484F58;
            --corruption-critical: #F85149;
            --corruption-high: #F0883E;
            --corruption-medium: #D29922;
            --corruption-low: #3FB950;
            --corruption-clean: #58A6FF;
            --accent-glow: rgba(248, 81, 73, 0.12);
            --font-display: 'Space Grotesk', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        #root { min-height: 100vh; }

        /* Header */
        .site-header {
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            position: sticky;
            top: 0;
            background: rgba(6, 9, 15, 0.85);
            backdrop-filter: blur(16px);
            z-index: 100;
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .logo {
            font-family: var(--font-display);
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--corruption-critical);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }
        .logo span { color: var(--corruption-critical); }
        .header-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        /* Main content */
        .main-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Hero */
        .hero {
            padding: 3rem 0 2.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.15;
            margin-bottom: 1rem;
        }
        .hero p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 640px;
            line-height: 1.7;
        }
        .hero-stats {
            display: flex;
            gap: 2.5rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .hero-stat {
            display: flex;
            flex-direction: column;
        }
        .hero-stat-value {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .hero-stat-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 0.15rem;
            display: inline-flex;
            align-items: center;
        }

        /* Methodology */
        .methodology {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.75rem;
            margin-bottom: 2rem;
        }
        .methodology-toggle {
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            text-align: left;
        }
        .methodology-toggle svg {
            transition: transform 0.2s;
        }
        .methodology-content {
            margin-top: 1.25rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
        }
        .methodology-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem;
            background: var(--bg-elevated);
            border-radius: 8px;
        }
        .methodology-weight {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--corruption-critical);
            min-width: 40px;
            text-align: right;
        }
        .methodology-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .methodology-full {
            margin-top: 1.25rem;
        }
        .methodology-disclaimer {
            background: rgba(210, 153, 34, 0.08);
            border: 1px solid rgba(210, 153, 34, 0.3);
            border-radius: 8px;
            padding: 0.9rem 1.1rem;
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .methodology-disclaimer strong {
            color: var(--corruption-medium);
            font-family: var(--font-display);
        }
        .methodology-section {
            margin-bottom: 1.25rem;
        }
        .methodology-section h5 {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
        }
        .methodology-section p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.65;
        }
        .methodology-download {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .download-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-highlight);
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 0.78rem;
            font-weight: 600;
            padding: 0.45rem 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .download-btn:hover { border-color: var(--corruption-critical); }

        /* Filters */
        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: var(--font-body);
            font-size: 0.82rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover {
            border-color: var(--border-highlight);
            color: var(--text-primary);
        }
        .filter-btn.active {
            background: var(--bg-elevated);
            border-color: var(--corruption-critical);
            color: var(--text-primary);
        }
        .filter-group-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: var(--font-mono);
            margin-bottom: 0.25rem;
        }

        /* Mexico Map */
        .map-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.75rem;
            margin-bottom: 2rem;
        }
        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .map-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
        }
        .map-clear-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--corruption-critical);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .map-body {
            display: grid;
            grid-template-columns: 1fr 220px;
            gap: 1.5rem;
            align-items: start;
        }
        .map-svg-wrap {
            position: relative;
            width: 100%;
        }
        .map-svg-wrap svg {
            width: 100%;
            height: auto;
            display: block;
        }
        .map-svg-wrap svg path.mx-state {
            stroke: var(--bg-primary);
            stroke-width: 0.6;
            cursor: pointer;
            transition: filter 0.15s, opacity 0.15s;
        }
        .map-svg-wrap svg path.mx-state:hover {
            filter: brightness(1.35);
        }
        .map-svg-wrap svg path.mx-state.mx-selected {
            stroke: #fff;
            stroke-width: 1.6;
        }
        .map-svg-wrap svg path.mx-state.mx-dimmed {
            opacity: 0.35;
        }
        .map-tooltip {
            position: absolute;
            pointer-events: none;
            background: var(--bg-elevated);
            border: 1px solid var(--border-highlight);
            border-radius: 6px;
            padding: 0.5rem 0.7rem;
            font-size: 0.75rem;
            z-index: 10;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .map-tooltip strong {
            font-family: var(--font-display);
            display: block;
            margin-bottom: 0.15rem;
        }
        .map-legend {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .map-legend-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: var(--font-mono);
            margin-bottom: 0.25rem;
        }
        .map-legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .map-legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .map-top-states {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .map-top-state-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            padding: 0.3rem 0;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .map-top-state-row:hover { color: var(--text-primary); }
        .map-top-state-row span:last-child {
            font-family: var(--font-mono);
        }
        @media (max-width: 768px) {
            .map-body { grid-template-columns: 1fr; }
        }

        /* Pagination */
        .pagination-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            margin: 1.75rem 0;
        }
        .pagination-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }
        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .page-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            min-width: 36px;
            height: 36px;
            padding: 0 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .page-btn:hover:not(:disabled) {
            border-color: var(--border-highlight);
            color: var(--text-primary);
        }
        .page-btn.active {
            background: var(--corruption-critical);
            border-color: var(--corruption-critical);
            color: white;
            font-weight: 600;
        }
        .page-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .page-btn.page-nav {
            font-family: var(--font-body);
            padding: 0 0.9rem;
        }
        .page-ellipsis {
            color: var(--text-muted);
            padding: 0 0.25rem;
            font-family: var(--font-mono);
        }

        /* National Timeline */
        .view-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .view-toggle-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .view-toggle-btn:hover {
            border-color: var(--border-highlight);
            color: var(--text-primary);
        }
        .view-toggle-btn.active {
            background: var(--bg-elevated);
            border-color: var(--corruption-critical);
            color: var(--text-primary);
        }
        .timeline-national {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.75rem;
        }
        .timeline-national-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .timeline-national-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }
        .tn-year-group {
            display: grid;
            grid-template-columns: 90px 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .tn-year-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tn-year-label {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            position: sticky;
            top: 80px;
        }
        .tn-year-line {
            width: 2px;
            flex: 1;
            background: var(--border);
            margin-top: 0.5rem;
        }
        .tn-year-events {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .tn-event {
            display: flex;
            gap: 0.75rem;
        }
        .tn-event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 0.4rem;
            flex-shrink: 0;
        }
        .tn-event-content {
            flex: 1;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(33, 38, 45, 0.5);
        }
        .tn-event-text {
            font-size: 0.85rem;
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 0.4rem;
        }
        .tn-event-official {
            background: none;
            border: none;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            cursor: pointer;
            padding: 0;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .tn-event-official:hover {
            text-decoration: underline;
        }
        .tn-badge {
            font-size: 0.62rem;
            background: rgba(248, 81, 73, 0.15);
            color: var(--corruption-critical);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
        }
        @media (max-width: 640px) {
            .tn-year-group { grid-template-columns: 50px 1fr; }
            .tn-year-label { font-size: 1rem; position: static; }
        }

        /* InfoTip — tap-to-explain icon */
        .infotip {
            position: relative;
            display: inline-flex;
            vertical-align: middle;
        }
        .infotip-btn {
            background: none;
            border: none;
            padding: 0;
            margin: 0 0 0 0.3rem;
            color: var(--text-muted);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            line-height: 0;
        }
        .infotip-btn:hover, .infotip-btn:active {
            color: var(--text-secondary);
        }
        .infotip-bubble {
            position: absolute;
            bottom: calc(100% + 8px);
            z-index: 50;
            background: var(--bg-elevated);
            border: 1px solid var(--border-highlight);
            border-radius: 8px;
            padding: 0.6rem 0.75rem;
            font-size: 0.75rem;
            font-family: var(--font-body);
            font-weight: 400;
            color: var(--text-primary);
            line-height: 1.5;
            width: max-content;
            max-width: 220px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .infotip-left { left: 0; }
        .infotip-right { right: 0; }
        .infotip-center { left: 50%; transform: translateX(-50%); }

        /* Semáforo */
        .semaforo {
            display: inline-flex;
            flex-direction: column;
            gap: 3px;
            padding: 3px;
            background: #000;
            border-radius: 4px;
            vertical-align: middle;
        }
        .semaforo-light {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .semaforo-lg .semaforo-light {
            width: 12px;
            height: 12px;
        }
        .semaforo-lg { gap: 5px; padding: 5px; }

        /* Story View */
        .story-overlay {
            position: fixed;
            inset: 0;
            background: #06090F;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .story-progress {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            gap: 4px;
            z-index: 10;
        }
        .story-progress-seg {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.15);
        }
        .story-progress-seg.done { background: rgba(255,255,255,0.5); }
        .story-progress-seg.active { background: #fff; }
        .story-close {
            position: absolute;
            top: 24px;
            right: 16px;
            z-index: 10;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .story-tapzone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 35%;
            z-index: 5;
            cursor: pointer;
        }
        .story-tapzone-left { left: 0; }
        .story-tapzone-right { right: 0; }
        .story-card {
            width: 100%;
            max-width: 420px;
            margin: 0 1.25rem;
            padding: 2.5rem 1.75rem;
            border: 1px solid;
            border-radius: 16px;
            background: linear-gradient(180deg, var(--bg-card), var(--bg-primary));
        }
        .story-top {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .story-badge {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 700;
        }
        .story-name {
            font-family: var(--font-display);
            font-size: 1.7rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }
        .story-role {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1.75rem;
        }
        .story-score {
            font-family: var(--font-display);
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1;
        }
        .story-score-max {
            font-size: 1.6rem;
            color: var(--text-muted);
        }
        .story-score-label {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.75rem;
        }
        .story-cats {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1.75rem;
        }
        .story-cat-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .story-cat-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .story-cat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex: 1;
        }
        .story-cat-val {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-primary);
        }
        .story-actions {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 8;
        }
        .story-action-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-highlight);
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .story-footer {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-muted);
            text-align: center;
        }
        @media (max-width: 480px) {
            .story-score { font-size: 3.5rem; }
            .story-name { font-size: 1.4rem; }
        }

        /* Featured banner (Caso del día / Sorpréndeme) */
        .featured-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .featured-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-elevated));
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .featured-card:hover { border-color: var(--border-highlight); }
        .featured-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--corruption-critical);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.25rem;
        }
        .featured-name {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
        }
        .featured-role {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .featured-score {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
            margin-left: auto;
            flex-shrink: 0;
        }
        .surprise-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            cursor: pointer;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 0.78rem;
            font-weight: 600;
            transition: border-color 0.15s;
            white-space: nowrap;
        }
        .surprise-btn:hover { border-color: var(--border-highlight); }
        .stories-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            cursor: pointer;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 0.78rem;
            font-weight: 600;
            transition: border-color 0.15s;
            white-space: nowrap;
        }
        .stories-btn:hover { border-color: var(--border-highlight); }
        @media (max-width: 640px) {
            .featured-row { grid-template-columns: 1fr; }
            .featured-row > div { width: 100%; }
        }

        /* Newsletter */
        .newsletter-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            max-width: 480px;
            margin: 0 auto 2rem;
            text-align: left;
        }
        .newsletter-text h3 {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .newsletter-text p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        .newsletter-form {
            display: flex;
            gap: 0.5rem;
        }
        .newsletter-input {
            flex: 1;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.85rem;
            padding: 0.6rem 0.85rem;
            border-radius: 7px;
            outline: none;
        }
        .newsletter-input:focus { border-color: var(--corruption-critical); }
        .newsletter-btn {
            background: var(--corruption-critical);
            color: white;
            border: none;
            font-family: var(--font-display);
            font-size: 0.82rem;
            font-weight: 600;
            padding: 0 1.1rem;
            border-radius: 7px;
            cursor: pointer;
            white-space: nowrap;
        }
        .newsletter-btn:disabled { opacity: 0.6; cursor: wait; }
        .newsletter-sent {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--corruption-low);
            font-weight: 500;
        }
        .newsletter-error {
            font-size: 0.75rem;
            color: var(--corruption-high);
            margin-top: 0.5rem;
        }

        /* National Stats Dashboard */
        .stats-dashboard {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.75rem;
        }
        .stats-dashboard-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.75rem;
        }
        .stats-panel h4 {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        .stats-panel-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 0.9rem;
        }
        .stats-bars {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }
        .stat-bar-row {
            display: grid;
            grid-template-columns: 100px 1fr 46px;
            align-items: center;
            gap: 0.6rem;
        }
        .stat-party-label {
            font-size: 0.68rem;
            text-align: center;
        }
        .stat-cat-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stat-bar-track {
            height: 8px;
            background: var(--bg-elevated);
            border-radius: 4px;
            overflow: hidden;
        }
        .stat-bar-fill {
            height: 100%;
            background: var(--corruption-critical);
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        .stat-bar-value {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-align: right;
        }

        /* Patterns View */
        .patterns-view {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.75rem;
        }
        .patterns-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .pattern-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.15s;
        }
        .pattern-card.expanded {
            border-color: var(--corruption-critical);
        }
        .pattern-summary {
            padding: 1.1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            cursor: pointer;
            flex-wrap: wrap;
        }
        .pattern-summary:hover {
            background: var(--bg-elevated);
        }
        .pattern-summary h3 {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }
        .pattern-desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 560px;
        }
        .pattern-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.3rem;
            flex-shrink: 0;
        }
        .pattern-count {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .pattern-avg {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: 600;
        }
        .pattern-detail {
            padding: 0 1.25rem 1.25rem;
            border-top: 1px solid var(--border);
        }
        .pattern-mechanism {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin: 1rem 0;
        }
        .pattern-mechanism strong {
            color: var(--text-primary);
            font-family: var(--font-display);
        }
        .pattern-members {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .pattern-member-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            background: var(--bg-elevated);
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .pattern-member-row:hover {
            opacity: 0.85;
        }
        .pattern-member-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .pattern-member-info {
            flex: 1;
            min-width: 0;
        }
        .pattern-member-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
        }
        .pattern-member-role {
            font-size: 0.72rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pattern-member-score {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Compare View */
        .compare-view {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.75rem;
        }
        .compare-slots {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 1.25rem;
            align-items: center;
            margin-bottom: 2rem;
        }
        .compare-vs {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        .compare-slot {
            min-height: 180px;
        }
        .compare-picker {
            background: var(--bg-elevated);
            border: 1px dashed var(--border-highlight);
            border-radius: 10px;
            padding: 1.25rem;
            height: 100%;
        }
        .compare-picker-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.6rem;
        }
        .compare-picker-results {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            max-height: 220px;
            overflow-y: auto;
        }
        .compare-picker-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0.6rem;
            background: var(--bg-card);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
        }
        .compare-picker-item:hover {
            background: var(--bg-primary);
        }
        .compare-picker-empty {
            font-size: 0.78rem;
            color: var(--text-muted);
            padding: 0.5rem;
        }
        .compare-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-highlight);
            border-radius: 10px;
            padding: 1.25rem;
            position: relative;
            height: 100%;
        }
        .compare-remove {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border-radius: 5px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .compare-card h3 {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 600;
            padding-right: 5rem;
            margin-bottom: 0.3rem;
        }
        .compare-role {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.9rem;
        }
        .compare-score {
            font-family: var(--font-display);
            font-size: 2.4rem;
            font-weight: 700;
        }
        .compare-badge {
            display: inline-block;
            margin-top: 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
        }
        .compare-breakdown {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .compare-row {
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(33, 38, 45, 0.5);
        }
        .compare-row-total {
            border-top: 1px solid var(--border);
            border-bottom: none;
            padding-top: 0.85rem;
            margin-top: 0.4rem;
        }
        .compare-row-total .compare-row-label {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--text-primary);
        }
        .compare-row-value {
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
        }
        .compare-row-value.winner {
            color: var(--corruption-critical);
            font-size: 1.2rem;
        }
        .compare-row-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-align: center;
        }
        .compare-row-max {
            color: var(--text-muted);
            margin-left: 0.2rem;
        }
        @media (max-width: 640px) {
            .compare-slots { grid-template-columns: 1fr; }
            .compare-vs { text-align: center; }
        }
        .search-input {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            min-width: 240px;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--corruption-critical); }

        /* Leaderboard */
        .leaderboard {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .leaderboard-header {
            display: grid;
            grid-template-columns: 48px 1fr 140px 100px 120px;
            padding: 0.5rem 1.25rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: var(--font-mono);
        }
        .official-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
        }
        .official-card:hover {
            border-color: var(--border-highlight);
            background: var(--bg-card-hover);
        }
        .official-card.expanded {
            border-color: var(--corruption-critical);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .official-summary {
            display: grid;
            grid-template-columns: 48px 1fr 140px 100px 120px;
            align-items: center;
            padding: 1rem 1.25rem;
            gap: 0.5rem;
        }
        .rank {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        .rank.top-3 { color: var(--corruption-critical); }
        .official-info h3 {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .official-role {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 0.15rem;
        }
        .official-meta {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.3rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            flex-wrap: wrap;
        }
        .source-strength {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .source-dots {
            display: inline-flex;
            gap: 2px;
        }
        .source-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--border-highlight);
        }
        .source-dot.filled {
            background: currentColor;
        }
        .verified-date {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .share-btn {
            margin-left: auto;
            background: var(--corruption-critical);
            color: white;
            border: none;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .share-btn:hover:not(:disabled) { opacity: 0.9; }
        .share-btn:disabled { opacity: 0.6; cursor: wait; }
        .speak-btn {
            margin-left: auto;
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border-highlight);
        }
        .speak-btn ~ .share-btn { margin-left: 0; }
        .official-party {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
            text-align: center;
        }
        .party-pri { background: rgba(220, 38, 38, 0.15); color: #F87171; }
        .party-morena { background: rgba(139, 69, 19, 0.2); color: #D97706; }
        .party-pan { background: rgba(59, 130, 246, 0.15); color: #60A5FA; }
        .party-pvem { background: rgba(34, 197, 94, 0.15); color: #4ADE80; }
        .party-mc { background: rgba(249, 115, 22, 0.15); color: #FB923C; }

        .score-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .score-bar-bg {
            flex: 1;
            height: 6px;
            background: var(--bg-elevated);
            border-radius: 3px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        .score-value {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 700;
            min-width: 38px;
            text-align: right;
        }

        /* Detail Panel */
        .official-detail {
            border-top: 1px solid var(--border);
            padding: 1.5rem 1.25rem;
            animation: slideDown 0.25s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.25rem;
        }
        .detail-section h4 {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(33, 38, 45, 0.5);
            font-size: 0.85rem;
        }
        .detail-item:last-child { border-bottom: none; }
        .detail-item-label { color: var(--text-secondary); }
        .detail-item-value {
            font-family: var(--font-mono);
            font-weight: 500;
        }

        /* Score breakdown bars */
        .breakdown-item {
            margin-bottom: 0.6rem;
        }
        .breakdown-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            margin-bottom: 0.25rem;
        }
        .breakdown-label span:first-child { color: var(--text-secondary); }
        .breakdown-label span:last-child { font-family: var(--font-mono); }
        .breakdown-bar {
            height: 4px;
            background: var(--bg-elevated);
            border-radius: 2px;
            overflow: hidden;
        }
        .breakdown-fill {
            height: 100%;
            border-radius: 2px;
        }

        /* Timeline */
        .timeline {
            margin-top: 1.25rem;
        }
        .timeline-event {
            display: flex;
            gap: 1rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(33, 38, 45, 0.5);
            font-size: 0.82rem;
        }
        .timeline-event:last-child { border-bottom: none; }
        .timeline-year {
            font-family: var(--font-mono);
            color: var(--corruption-critical);
            min-width: 48px;
            font-weight: 500;
        }
        .timeline-desc { color: var(--text-secondary); }

        /* Sources */
        .sources {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .sources h4 {

        /* Footer */

        .footer-disclaimer {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.72rem;
            color: var(--text-muted);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;

        /* Responsive */
        @media (max-width: 768px) {
            .main-content { padding: 1rem; }
            .site-header { padding: 1rem; }
            .leaderboard-header { display: none; }
            .official-summary {
                grid-template-columns: 36px 1fr;
                grid-template-rows: auto auto;
                gap: 0.5rem;
            }
            .official-party, .score-badge {
                grid-column: 2;
            }
            .hero-stats { gap: 1.5rem; }
            .detail-grid {
                grid-template-columns: 1fr;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .search-input { min-width: auto; }

        /* Contribution CTA */
        .contribute-banner {
            background: linear-gradient(135deg, rgba(248, 81, 73, 0.08), rgba(248, 81, 73, 0.02));
            border: 1px solid rgba(248, 81, 73, 0.2);
            border-radius: 10px;
            padding: 1.5rem 1.75rem;
            margin-top: 2rem;

            align-items: center;
