            margin-bottom: 0.3rem;
        }
        .contribute-text p {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }
        .contribute-btn {
            background: var(--corruption-critical);
            color: white;
            border: none;
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.6rem 1.25rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .contribute-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="data.js"></script>
    <script type="text/babel">
        // Data loaded from data.js
        // officials and SCORING_CRITERIA are global

        // All data now comes from data.js (SCORING_CRITERIA and officials)
        const _unused = {
        };

        // HELPER FUNCTIONS
        // =====================================================
        function getTotalScore(scores) {
            return Object.values(scores).reduce((a, b) => a + b, 0);
        }

        function getMaxPossible() {
            return SCORING_CRITERIA.reduce((a, c) => a + c.maxPoints, 0);
        }

        function getScoreColor(score) {
            if (score >= 75) return 'var(--corruption-critical)';
            if (score >= 55) return 'var(--corruption-high)';
            if (score >= 35) return 'var(--corruption-medium)';
            if (score >= 15) return 'var(--corruption-low)';
            return 'var(--corruption-clean)';
        }

        // Canvas 2D contexts can't resolve CSS custom properties (var(--x)),
        // so any drawing on <canvas> must use these resolved hex equivalents.
        const HEX_COLORS = {
            critical: '#F85149',
            high: '#F0883E',
            medium: '#D29922',
            low: '#3FB950',
            clean: '#58A6FF',
        };
        function getScoreColorHex(score) {
            if (score >= 75) return HEX_COLORS.critical;
            if (score >= 55) return HEX_COLORS.high;
            if (score >= 35) return HEX_COLORS.medium;
            if (score >= 15) return HEX_COLORS.low;
            return HEX_COLORS.clean;
        }

        // Semáforo: colapsa los 5 niveles de severidad en las 3 luces que
        // cualquier mexicano ya entiende sin explicación.
        function getSemaforoTier(score) {
            if (score >= 55) return 'rojo';
            if (score >= 30) return 'amarillo';
            return 'verde';
        }
        function Semaforo({ score, size = 'sm' }) {
            const tier = getSemaforoTier(score);
            const lights = [
                { key: 'rojo', color: '#F85149' },
                { key: 'amarillo', color: '#D29922' },
                { key: 'verde', color: '#3FB950' },
            ];
            return (
                <span className={`semaforo semaforo-${size}`} title="Semáforo de corrupción">
                    {lights.map(l => (
                        <span
                            key={l.key}
                            className="semaforo-light"
                            style={{
                                background: l.key === tier ? l.color : 'rgba(255,255,255,0.08)',
                                boxShadow: l.key === tier ? `0 0 8px ${l.color}` : 'none',
                            }}
                        />
                    ))}
                </span>
            );
        }

        // Lee en voz alta el resumen de una ficha usando la Web Speech API
        // nativa del navegador (sin librerías, sin costo, sin servidor).
        function buildSpeechText(official) {
            const total = getTotalScore(official.scores);
            const topCat = SCORING_CRITERIA
                .map(c => ({ ...c, val: official.scores[c.id] }))
                .filter(c => c.val > 0)
                .sort((a, b) => b.val - a.val)[0];
            const evidence = topCat ? official.breakdown[topCat.id] : '';
            const shortEvidence = evidence && evidence.length > 260 ? evidence.slice(0, 260) + '...' : evidence;
            return `${official.name}. ${official.role}. ` +
                `Puntaje: ${total} de 100, nivel ${getScoreLabel(total).toLowerCase()}. ` +
                (topCat ? `Principal señalamiento, ${topCat.label}: ${shortEvidence}` : '');
        }
        function speakOfficial(official, onEnd) {
            if (!('speechSynthesis' in window)) return false;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(buildSpeechText(official));
            utter.lang = 'es-MX';
            utter.rate = 1.02;
            if (onEnd) utter.onend = onEnd;
            window.speechSynthesis.speak(utter);
            return true;
        }

        function getScoreLabel(score) {
            if (score >= 75) return 'CRÍTICO';
            if (score >= 55) return 'ALTO';
            if (score >= 35) return 'MEDIO';
            if (score >= 15) return 'BAJO';
            return 'SIN ALERTAS';
        }

        function getPartyClass(party) {
            const map = { 'PRI': 'party-pri', 'MORENA': 'party-morena', 'PAN': 'party-pan', 'PVEM': 'party-pvem', 'MC': 'party-mc' };
            return map[party] || 'party-pri';
        }

        // Source strength: weighs a case differently depending on how many
        // independent sources back it. 1 source = weak corroboration, 4+ = strong.
        function getSourceStrength(count) {
            if (count >= 4) return { label: 'Fuertemente respaldado', color: 'var(--corruption-clean)', dots: 4 };
            if (count === 3) return { label: 'Bien respaldado', color: 'var(--corruption-low)', dots: 3 };
            if (count === 2) return { label: 'Respaldo moderado', color: 'var(--corruption-medium)', dots: 2 };
            return { label: 'Fuente única', color: 'var(--corruption-high)', dots: 1 };
        }
        function getSourceStrengthHex(count) {
            if (count >= 4) return { label: 'Fuertemente respaldado', color: HEX_COLORS.clean, dots: 4 };
            if (count === 3) return { label: 'Bien respaldado', color: HEX_COLORS.low, dots: 3 };
            if (count === 2) return { label: 'Respaldo moderado', color: HEX_COLORS.medium, dots: 2 };
            return { label: 'Fuente única', color: HEX_COLORS.high, dots: 1 };
        }

        const MONTHS_ES = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
        function formatDateEs(isoDate) {
            if (!isoDate) return null;
            const [y, m, d] = isoDate.split('-').map(Number);
            if (!y || !m || !d) return isoDate;
            return `${d} ${MONTHS_ES[m - 1]} ${y}`;
        }

        // =====================================================
        // COMPONENTS
        // =====================================================

        // Lightweight inline SVG icons (stroke-based, currentColor) — used
        // instead of emoji throughout the UI so rendering doesn't depend on
        // the OS/browser's emoji font (which varies a lot and can render as
        // blank boxes) and so the visual style stays consistent everywhere.
        // Tap-to-explain tooltip. Built for mobile: no hover, just tap the
        // small (i) icon to see a short explanation, tap anywhere else to close.
        function InfoTip({ text, align = 'left' }) {
            const [open, setOpen] = React.useState(false);
            const ref = React.useRef(null);

            React.useEffect(() => {
                if (!open) return;
                const close = (e) => {
                    if (ref.current && !ref.current.contains(e.target)) setOpen(false);
                };
                document.addEventListener('touchstart', close);
                document.addEventListener('mousedown', close);
                return () => {
                    document.removeEventListener('touchstart', close);
                    document.removeEventListener('mousedown', close);
                };
            }, [open]);

            return (
                <span className="infotip" ref={ref}>
                    <button
                        type="button"
                        className="infotip-btn"
                        onClick={(e) => { e.stopPropagation(); setOpen(!open); }}
                        aria-label="Info"
                    >
                        <Icon name="info" size={13} />
                    </button>
                    {open && (
                        <span className={`infotip-bubble infotip-${align}`} onClick={(e) => e.stopPropagation()}>
                            {text}
                        </span>
                    )}
                </span>
            );
        }

        function Icon({ name, size = 16, style }) {
            const common = {
                width: size, height: size, viewBox: '0 0 24 24',
                fill: 'none', stroke: 'currentColor', strokeWidth: 2,
                strokeLinecap: 'round', strokeLinejoin: 'round',
                style: { display: 'inline-block', verticalAlign: 'middle', ...style },
            };
            switch (name) {
                case 'scale':
                    return (
                        <svg {...common}>
                            <path d="M12 3v18M7 21h10" />
                            <path d="M5 7l-3 6a3 3 0 0 0 6 0l-3-6z" />
                            <path d="M19 7l-3 6a3 3 0 0 0 6 0l-3-6z" />
                            <path d="M5 7h14M12 3l-2 4h4l-2-4z" />
                        </svg>
                    );
                case 'bar-chart':
                    return (
                        <svg {...common}>
                            <path d="M4 20V10M12 20V4M20 20v-7" />
                        </svg>
                    );
                case 'clock':
                    return (
                        <svg {...common}>
                            <circle cx="12" cy="12" r="9" />
                            <path d="M12 7v5l3 3" />
                        </svg>
                    );
                case 'trending-up':
                    return (
                        <svg {...common}>
                            <path d="M3 17l6-6 4 4 8-8" />
                            <path d="M15 7h6v6" />
                        </svg>
                    );
                case 'users':
                    return (
                        <svg {...common}>
                            <circle cx="9" cy="8" r="3.2" />
                            <path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6" />
                            <circle cx="17.5" cy="9" r="2.5" />
                            <path d="M15.5 14.2c2.5.4 4.5 2.6 4.5 5.8" />
                        </svg>
                    );
                case 'dot':
                    return (
                        <svg {...common} fill="currentColor" stroke="none">
                            <circle cx="12" cy="12" r="6" />
                        </svg>
                    );
                case 'clipboard':
                    return (
                        <svg {...common}>
                            <rect x="6" y="4" width="12" height="17" rx="2" />
                            <path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1" />
                            <path d="M9 11h6M9 15h6" />
                        </svg>
                    );
                case 'folder':
                    return (
                        <svg {...common}>
                            <path d="M3 6a1 1 0 0 1 1-1h5l2 2h9a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6z" />
                        </svg>
                    );
                case 'share':
                    return (
                        <svg {...common}>
                            <path d="M12 16V4M8 8l4-4 4 4" />
                            <path d="M4 14v5a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5" />
                        </svg>
                    );
                case 'check':
                    return (
                        <svg {...common}>
                            <path d="M4 12l5 5L20 6" />
                        </svg>
                    );
                case 'x':
                    return (
                        <svg {...common}>
                            <path d="M5 5l14 14M19 5L5 19" />
                        </svg>
                    );
                case 'alert-triangle':
                    return (
                        <svg {...common}>
                            <path d="M12 4l9 16H3l9-16z" />
                            <path d="M12 10v4M12 17.5v.01" />
                        </svg>
                    );
                case 'info':
                    return (
                        <svg {...common}>
                            <circle cx="12" cy="12" r="9" />
                            <path d="M12 11v5M12 8v.01" />
                        </svg>
                    );
                case 'volume':
                    return (
                        <svg {...common}>
                            <path d="M4 9v6h4l5 5V4L8 9H4z" />
                            <path d="M17 8a5 5 0 0 1 0 8M19.5 5.5a9 9 0 0 1 0 13" />
                        </svg>
                    );
                case 'volume-off':
                    return (
                        <svg {...common}>
                            <path d="M4 9v6h4l5 5V4L8 9H4z" />
                            <path d="M17 9l5 6M22 9l-5 6" />
                        </svg>
                    );
                case 'shuffle':
                    return (
                        <svg {...common}>
                            <path d="M3 6h3l7 12h5M3 18h3l3.5-6M17 6h3v3M20 6l-5 5" />
                        </svg>
                    );
                case 'film':
                    return (
                        <svg {...common}>
                            <rect x="3" y="4" width="18" height="16" rx="2" />
                            <path d="M7 4v16M17 4v16M3 9h4M3 15h4M17 9h4M17 15h4" />
                        </svg>
                    );
                default:
                    return null;
            }
        }

        // =====================================================
        // MEXICO MAP COMPONENT
        // =====================================================
        // Maps SVG path data-id -> canonical state name used in officials[].state
        const SVG_ID_TO_STATE = {
            'Chiapas': 'Chiapas', 'Oaxaca': 'Oaxaca', 'Guerrero': 'Guerrero',
            'Tabasco': 'Tabasco', 'Puebla': 'Puebla', 'Mexico': 'Estado de México',
            'Colima': 'Colima', 'CampecheMainland': 'Campeche', 'CampecheIsland': 'Campeche',
            'Jalisco': 'Jalisco', 'Federal': 'Ciudad de México', 'Hidalgo': 'Hidalgo',
            'Guanajuato': 'Guanajuato', 'Queretaro': 'Querétaro', 'Zacatecas': 'Zacatecas',
            'SanLuisPotosi': 'San Luis Potosí', 'VeracruzMainland': 'Veracruz', 'VeracruzIsland': 'Veracruz',
            'QuintanaRooMainland': 'Quintana Roo', 'QuintanaRooIsland1': 'Quintana Roo',
            'QuintanaRooIsland2': 'Quintana Roo', 'QuintanaRooIsland3': 'Quintana Roo', 'QuintanaRooIsland4': 'Quintana Roo',
            'Tamaulipas': 'Tamaulipas', 'Durango': 'Durango', 'NuevoLeon': 'Nuevo León',
            'Coahuila': 'Coahuila', 'SinaloaMainland': 'Sinaloa', 'SinaloaIsland': 'Sinaloa',
            'Chihuahua': 'Chihuahua',
            'BajaSurMainland': 'Baja California Sur', 'BajaSurIsland1': 'Baja California Sur',
            'BajaSurIsland2': 'Baja California Sur', 'BajaSurIsland3': 'Baja California Sur',
            'BajaSurIsland4': 'Baja California Sur', 'BajaSurIsland5': 'Baja California Sur',
            'BajaSurIsland6': 'Baja California Sur', 'BajaSurIsland7': 'Baja California Sur',
            'BajaSurIsland8': 'Baja California Sur', 'BajaSurIsland7_1': 'Baja California Sur',
            'BajaSurIsland8_1': 'Baja California Sur', 'BajaSurIsland9': 'Baja California Sur',
            'BajaSurIsland0': 'Baja California Sur',
            'Michoacan': 'Michoacán', 'Morelos': 'Morelos', 'Tlaxcala': 'Tlaxcala',
            'Yucatan': 'Yucatán', 'Aguascalientes': 'Aguascalientes',
            'NayaritMainland': 'Nayarit', 'NayaritIsland1': 'Nayarit', 'NayaritIsland2': 'Nayarit',
            'NayaritIsland3': 'Nayarit', 'NayaritIsland4': 'Nayarit',
            'BajaNorteIsland1': 'Baja California', 'BajaNorteMainland': 'Baja California',
            'BajaNorteIsland2': 'Baja California', 'BajaNorteIsland3': 'Baja California',
            'BajaNorteIsland4': 'Baja California',
            'SonoraIsland1': 'Sonora', 'SonoraIsland2': 'Sonora', 'SonoraMainland': 'Sonora',
            'SonoraIsland3': 'Sonora',
        };

        function MexicoMap({ officials, selectedState, onSelectState }) {
            const wrapRef = React.useRef(null);
            const [svgText, setSvgText] = React.useState(null);
            const [tooltip, setTooltip] = React.useState(null); // {x, y, state, count, maxScore}
            const [loadError, setLoadError] = React.useState(false);

            React.useEffect(() => {
                fetch('mexico-map.svg')
                    .then(r => { if (!r.ok) throw new Error('not found'); return r.text(); })
                    .then(setSvgText)
                    .catch(() => setLoadError(true));
            }, []);

            // Compute stats per state
            const stateStats = React.useMemo(() => {
                const map = {};
                officials.forEach(o => {
                    const total = getTotalScore(o.scores);
                    if (!map[o.state]) map[o.state] = { count: 0, maxScore: 0, sumScore: 0 };
                    map[o.state].count += 1;
                    map[o.state].sumScore += total;
                    map[o.state].maxScore = Math.max(map[o.state].maxScore, total);
                });
                Object.keys(map).forEach(k => { map[k].avgScore = map[k].sumScore / map[k].count; });
                return map;
            }, [officials]);

            // Apply colors / listeners once SVG is injected
            React.useEffect(() => {
                if (!svgText || !wrapRef.current) return;
                const container = wrapRef.current;
                const paths = container.querySelectorAll('path.mx-state');
                paths.forEach(path => {
                    const svgId = path.getAttribute('data-id');
                    const stateName = SVG_ID_TO_STATE[svgId];
                    const stats = stateName ? stateStats[stateName] : null;
                    const color = stats ? getScoreColor(stats.maxScore) : 'var(--bg-elevated)';
                    path.style.fill = stats ? color : '#161B22';

                    path.onclick = () => {
                        if (!stateName) return;
                        onSelectState(selectedState === stateName ? null : stateName);
                    };
                    path.onmousemove = (e) => {
                        if (!stateName) return;
                        const rect = container.getBoundingClientRect();
                        setTooltip({
                            x: e.clientX - rect.left,
                            y: e.clientY - rect.top,
                            state: stateName,
                            count: stats ? stats.count : 0,
                            maxScore: stats ? stats.maxScore : 0,
                        });
                    };
                    path.onmouseleave = () => setTooltip(null);
                });
            }, [svgText, stateStats, selectedState, onSelectState]);

            // Update selected/dimmed classes reactively
            React.useEffect(() => {
                if (!wrapRef.current) return;
                const paths = wrapRef.current.querySelectorAll('path.mx-state');
                paths.forEach(path => {
                    const svgId = path.getAttribute('data-id');
                    const stateName = SVG_ID_TO_STATE[svgId];
                    path.classList.toggle('mx-selected', !!selectedState && stateName === selectedState);
                    path.classList.toggle('mx-dimmed', !!selectedState && stateName !== selectedState);
                });
            }, [selectedState, svgText]);

            const topStates = Object.entries(stateStats)
                .filter(([name]) => name !== 'Federal')
                .sort((a, b) => b[1].maxScore - a[1].maxScore)
                .slice(0, 6);

            return (
                <div className="map-section">
                    <div className="map-header">
                        <div className="map-title">
                            Mapa por estado
                            <InfoTip text="Toca un estado para filtrar la lista de abajo. Tócalo de nuevo para quitar el filtro." />
                        </div>
                        {selectedState && (
                            <button className="map-clear-btn" onClick={() => onSelectState(null)}>
                                <Icon name="x" size={12} /> Quitar filtro: {selectedState}
                            </button>
                        )}
                    </div>

                    {loadError ? (
                        <div style={{ color: 'var(--text-muted)', fontSize: '0.85rem' }}>
                            No se pudo cargar el mapa. Usa los filtros de arriba para explorar por estado.
                        </div>
                    ) : (
                        <div className="map-body">
                            <div className="map-svg-wrap" ref={wrapRef}>
                                {svgText ? (
                                    <div dangerouslySetInnerHTML={{ __html: svgText }} />
                                ) : (
                                    <div style={{ color: 'var(--text-muted)', fontSize: '0.85rem', padding: '2rem 0' }}>
                                        Cargando mapa...
                                    </div>
                                )}
                                {tooltip && (
                                    <div className="map-tooltip" style={{ left: tooltip.x + 12, top: tooltip.y + 12 }}>
                                        <strong>{tooltip.state}</strong>
                                        {tooltip.count} funcionario{tooltip.count !== 1 ? 's' : ''} · score máx. {tooltip.maxScore}
                                    </div>
                                )}
                            </div>

                            <div>
                                <div className="map-legend">
                                    <div className="map-legend-title">Nivel más alto registrado</div>
                                    <div className="map-legend-item">
                                        <div className="map-legend-swatch" style={{ background: 'var(--corruption-critical)' }} />
                                        Crítico (≥75)
                                    </div>
                                    <div className="map-legend-item">
                                        <div className="map-legend-swatch" style={{ background: 'var(--corruption-high)' }} />
                                        Alto (55-74)
                                    </div>
                                    <div className="map-legend-item">
                                        <div className="map-legend-swatch" style={{ background: 'var(--corruption-medium)' }} />
                                        Medio (35-54)
                                    </div>
                                    <div className="map-legend-item">
                                        <div className="map-legend-swatch" style={{ background: 'var(--corruption-low)' }} />
                                        Bajo (15-34)
                                    </div>
                                    <div className="map-legend-item">
                                        <div className="map-legend-swatch" style={{ background: '#161B22', border: '1px solid var(--border)' }} />
                                        Sin registros
                                    </div>
                                </div>

                                <div className="map-top-states">
                                    <div className="map-legend-title">Estados con más registros</div>
                                    {topStates.map(([name, stats]) => (
                                        <div
                                            key={name}
                                            className="map-top-state-row"
                                            onClick={() => onSelectState(selectedState === name ? null : name)}
                                        >
                                            <span>{name}</span>
                                            <span style={{ color: getScoreColor(stats.maxScore) }}>{stats.count}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // =====================================================
        // PAGINATION COMPONENT
        // =====================================================
        function Pagination({ currentPage, totalPages, onPageChange, totalItems, pageSize }) {
            // Build a compact page list with ellipses: 1 ... p-1 p p+1 ... last
            const pages = [];
            const add = (p) => { if (!pages.includes(p)) pages.push(p); };
            add(1);
            for (let p = currentPage - 1; p <= currentPage + 1; p++) {
                if (p >= 1 && p <= totalPages) add(p);
            }
            add(totalPages);
            pages.sort((a, b) => a - b);

            const rangeStart = (currentPage - 1) * pageSize + 1;
            const rangeEnd = Math.min(currentPage * pageSize, totalItems);

            const items = [];
            let prev = 0;
            pages.forEach(p => {
                if (p - prev > 1) items.push('ellipsis-' + p);
                items.push(p);
                prev = p;
            });

            return (
                <div className="pagination-wrap">
                    <div className="pagination-info">
                        Mostrando {rangeStart}–{rangeEnd} de {totalItems} funcionarios
                    </div>
                    <div className="pagination-controls">
                        <button
                            className="page-btn page-nav"
                            disabled={currentPage === 1}
                            onClick={() => onPageChange(currentPage - 1)}
                        >
                            ‹ Anterior
                        </button>
                        {items.map(item => (
                            typeof item === 'number' ? (
                                <button
                                    key={item}
                                    className={`page-btn ${item === currentPage ? 'active' : ''}`}
                                    onClick={() => onPageChange(item)}
                                >
                                    {item}
                                </button>
                            ) : (
                                <span key={item} className="page-ellipsis">…</span>
                            )
                        ))}
                        <button
                            className="page-btn page-nav"
                            disabled={currentPage === totalPages}
                            onClick={() => onPageChange(currentPage + 1)}
                        >
                            Siguiente ›
                        </button>
                    </div>
                </div>
            );
        }

        // =====================================================
        // NATIONAL TIMELINE COMPONENT
        // =====================================================
        function NationalTimeline({ officials, onJumpToOfficial }) {
            const [order, setOrder] = React.useState('desc'); // most recent first by default
            const [query, setQuery] = React.useState('');

            const events = React.useMemo(() => {
                const all = [];
                officials.forEach(o => {
                    (o.timeline || []).forEach((t, idx) => {
                        all.push({
                            year: parseInt(t.year, 10) || 0,
                            yearLabel: t.year,
                            event: t.event,
                            officialId: o.id,
                            officialName: o.name,
                            state: o.state,
                            status: o.status,
                            total: getTotalScore(o.scores),
                            seq: idx, // preserves rough chronological order within an official's own timeline
                        });
                    });
                });
                return all;
            }, [officials]);

            const filtered = events.filter(e => {
                if (!query) return true;
                const q = query.toLowerCase();
                return e.event.toLowerCase().includes(q) ||
                    e.officialName.toLowerCase().includes(q) ||
                    e.state.toLowerCase().includes(q);
            });

            const sorted = [...filtered].sort((a, b) => {
                const diff = order === 'asc' ? a.year - b.year : b.year - a.year;
                return diff !== 0 ? diff : a.seq - b.seq;
            });

            // Group by year
            const grouped = [];
            let lastYear = null;
            sorted.forEach(e => {
                if (e.yearLabel !== lastYear) {
                    grouped.push({ year: e.yearLabel, items: [] });
                    lastYear = e.yearLabel;
                }
                grouped[grouped.length - 1].items.push(e);
            });

            return (
                <div className="timeline-national">
                    <div className="timeline-national-header">
                        <div>
                            <div className="map-title">Línea de tiempo</div>
                            <p style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '0.35rem', maxWidth: '620px' }}>
                                Todo lo documentado, ordenado por año.
                            </p>
                        </div>
                        <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                            <input
                                className="search-input"
                                placeholder="Buscar evento, funcionario o estado..."
                                value={query}
                                onChange={e => setQuery(e.target.value)}
                            />
                            <button className="filter-btn" onClick={() => setOrder(order === 'desc' ? 'asc' : 'desc')}>
                                {order === 'desc' ? '↓ Más reciente primero' : '↑ Más antiguo primero'}
                            </button>
                        </div>
                    </div>

                    <div className="timeline-national-count">
                        {sorted.length} evento{sorted.length !== 1 ? 's' : ''} de {new Set(sorted.map(e => e.officialId)).size} funcionario{new Set(sorted.map(e => e.officialId)).size !== 1 ? 's' : ''}
                    </div>

                    <div className="timeline-national-body">
                        {grouped.map(group => (
                            <div className="tn-year-group" key={group.year}>
                                <div className="tn-year-marker">
                                    <div className="tn-year-label">{group.year}</div>
                                    <div className="tn-year-line" />
                                </div>
                                <div className="tn-year-events">
                                    {group.items.map((e, i) => (
                                        <div className="tn-event" key={e.officialId + '-' + i}>
                                            <div className="tn-event-dot" style={{ background: getScoreColor(e.total) }} />
                                            <div className="tn-event-content">
                                                <p className="tn-event-text">{e.event}</p>
                                                <button
                                                    className="tn-event-official"
                                                    onClick={() => onJumpToOfficial(e.officialId, e.officialName)}
                                                    style={{ color: getScoreColor(e.total) }}
                                                >
                                                    {e.officialName} · {e.state}
                                                    {e.status === 'en_funciones' && <span className="tn-badge">EN FUNCIONES</span>}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                        {grouped.length === 0 && (
                            <div style={{ textAlign: 'center', padding: '3rem', color: 'var(--text-muted)' }}>
                                No se encontraron eventos para "{query}"
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // NATIONAL STATS DASHBOARD
        // =====================================================
        const SEXENIOS = [
            { label: 'Fox (2000-2006)', start: 2000, end: 2006 },
            { label: 'Calderón (2006-2012)', start: 2006, end: 2012 },
            { label: 'Peña Nieto (2012-2018)', start: 2012, end: 2018 },
            { label: 'AMLO (2018-2024)', start: 2018, end: 2024 },
            { label: 'Sheinbaum (2024-2030)', start: 2024, end: 2030 },
        ];
        function getSexenio(year) {
            for (const s of SEXENIOS) {
                if (year >= s.start && year < s.end) return s.label;
            }
            if (year < 2000) return 'Antes de 2000';
            return 'Sin clasificar';
        }
        function earliestYear(official) {
            const years = (official.timeline || [])
                .map(t => parseInt(t.year, 10))
                .filter(y => !isNaN(y));
            return years.length ? Math.min(...years) : null;
        }

        function NationalStatsDashboard({ officials }) {
            const stats = React.useMemo(() => {
                const scored = officials.map(o => ({ ...o, total: getTotalScore(o.scores) }));

                // 1. Cases by party
                const byParty = {};
                scored.forEach(o => {
                    const p = o.party || 'Sin dato';
                    byParty[p] = (byParty[p] || 0) + 1;
                });
                const partyRanking = Object.entries(byParty)
                    .sort((a, b) => b[1] - a[1]);

                // 2. Category frequency & average intensity
                const categoryStats = SCORING_CRITERIA.map(c => {
                    const withScore = scored.filter(o => o.scores[c.id] > 0);
                    const avgAmongScored = withScore.length
                        ? withScore.reduce((sum, o) => sum + o.scores[c.id], 0) / withScore.length
                        : 0;
                    return {
                        id: c.id,
                        label: c.label,
                        maxPoints: c.maxPoints,
                        count: withScore.length,
                        pctOfCases: (withScore.length / scored.length) * 100,
                        avgAmongScored,
                    };
                }).sort((a, b) => b.count - a.count);

                // 3. Average score by sexenio (based on earliest documented event)
                const bySexenio = {};
                scored.forEach(o => {
                    const y = earliestYear(o);
                    const label = y ? getSexenio(y) : 'Sin fecha';
                    if (!bySexenio[label]) bySexenio[label] = { sum: 0, count: 0 };
                    bySexenio[label].sum += o.total;
                    bySexenio[label].count += 1;
                });
                const sexenioOrder = [...SEXENIOS.map(s => s.label), 'Antes de 2000', 'Sin fecha'];
                const sexenioRanking = sexenioOrder
                    .filter(label => bySexenio[label])
                    .map(label => ({
                        label,
                        avg: bySexenio[label].sum / bySexenio[label].count,
                        count: bySexenio[label].count,
                    }));

                return { partyRanking, categoryStats, sexenioRanking, total: scored.length };
            }, [officials]);

            const maxPartyCount = stats.partyRanking[0] ? stats.partyRanking[0][1] : 1;
            const maxCategoryCount = stats.categoryStats[0] ? stats.categoryStats[0].count : 1;
            const maxSexenioAvg = Math.max(...stats.sexenioRanking.map(s => s.avg), 1);

            return (
                <div className="stats-dashboard">
                    <div className="stats-dashboard-header">
                        <div className="map-title">Estadísticas</div>
                        <p style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '0.35rem' }}>
                            {stats.total} perfiles, en números.
                        </p>
                    </div>

                    <div className="stats-grid">
                        <div className="stats-panel">
                            <h4>Casos por partido político</h4>
                            <div className="stats-bars">
                                {stats.partyRanking.map(([party, count]) => (
                                    <div className="stat-bar-row" key={party}>
                                        <span className={`official-party ${getPartyClass(party)} stat-party-label`}>{party}</span>
                                        <div className="stat-bar-track">
                                            <div className="stat-bar-fill" style={{ width: `${(count / maxPartyCount) * 100}%` }} />
                                        </div>
                                        <span className="stat-bar-value">{count}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="stats-panel">
                            <h4>Categoría de corrupción más común</h4>
                            <p className="stats-panel-sub">% de perfiles con puntaje &gt; 0 en esa categoría</p>
                            <div className="stats-bars">
                                {stats.categoryStats.map(c => (
                                    <div className="stat-bar-row" key={c.id}>
                                        <span className="stat-cat-label">{c.label}</span>
                                        <div className="stat-bar-track">
                                            <div className="stat-bar-fill" style={{
                                                width: `${(c.count / maxCategoryCount) * 100}%`,
                                                background: 'var(--corruption-medium)'
                                            }} />
                                        </div>
                                        <span className="stat-bar-value">{c.pctOfCases.toFixed(0)}%</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="stats-panel">
                            <h4>Score promedio por sexenio<InfoTip text="Cada caso se ubica en el sexenio del primer hecho documentado en su expediente, no necesariamente cuándo fue detenido." /></h4>
                            <p className="stats-panel-sub">Según el año más antiguo documentado en cada perfil</p>
                            <div className="stats-bars">
                                {stats.sexenioRanking.map(s => (
                                    <div className="stat-bar-row" key={s.label}>
                                        <span className="stat-cat-label">{s.label}</span>
                                        <div className="stat-bar-track">
                                            <div className="stat-bar-fill" style={{
                                                width: `${(s.avg / maxSexenioAvg) * 100}%`,
                                                background: getScoreColor(s.avg)
                                            }} />
                                        </div>
                                        <span className="stat-bar-value">{s.avg.toFixed(0)} <span style={{ opacity: 0.5 }}>({s.count})</span></span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function StoryView({ officials, startIndex, onClose }) {
            const [index, setIndex] = React.useState(startIndex || 0);

            const total = officials.length;
            const official = officials[index];
            const score = getTotalScore(official.scores);
            const color = getScoreColorHex(score);

            React.useEffect(() => {
                return () => window.speechSynthesis && window.speechSynthesis.cancel();
            }, []);

            React.useEffect(() => {
                window.speechSynthesis && window.speechSynthesis.cancel();
                setSpeaking(false);
            }, [index]);

            const go = (dir) => {
                setIndex(i => {
                    const next = i + dir;
                    if (next < 0) return total - 1;
                    if (next >= total) return 0;
                    return next;
                });
            };

            const handleSpeak = () => {
                if (speaking) {
                    window.speechSynthesis.cancel();
                    setSpeaking(false);
                    return;
                }
                const ok = speakOfficial(official, () => setSpeaking(false));
                if (ok) setSpeaking(true);
            };

            const topCats = SCORING_CRITERIA
                .map(c => ({ ...c, val: official.scores[c.id] }))
                .filter(c => c.val > 0)
                .sort((a, b) => b.val - a.val)
                .slice(0, 3);

            return (
                <div className="story-overlay">
                    <div className="story-progress">

                            <div key={o.id} className={`story-progress-seg ${i === index ? 'active' : i < index ? 'done' : ''}`} />

        // =====================================================
        // Sitio estático sin backend: usamos un Google Form como "base de
        // datos" gratuita de suscriptores. Configura estos dos valores tras
        // crear tu Google Form (Formulario en blanco → campo "Correo
        // electrónico" tipo respuesta corta → menú ⋮ → Obtener enlace
        // prellenado → llena un correo de prueba → copia la URL generada):
        //   1. NEWSLETTER_FORM_ACTION: la parte de la URL antes de "?usp=pp_url"
        //      (cambia /viewform por /formResponse)
        //   2. NEWSLETTER_EMAIL_ENTRY: el "entry.XXXXXXXXX" que aparece en esa
        //      URL prellenada, es el ID interno de tu campo de correo
        const NEWSLETTER_FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLScA0eQ19KOHRaVbbcGGteCjxU774rCB8P6_e2Yjqd_QKj_uOg/formResponse';
        const NEWSLETTER_EMAIL_ENTRY = 'entry.511225374';

        function NewsletterSignup() {
            const [email, setEmail] = React.useState('');
            const [honeypot, setHoneypot] = React.useState('');
            const [status, setStatus] = React.useState('idle'); // idle | sending | sent | error | unconfigured

            const isValidEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (honeypot) return; // bot trap, silently ignore
                if (!isValidEmail(email)) {
                    setStatus('error');
                    return;
                }
                if (!NEWSLETTER_FORM_ACTION || !NEWSLETTER_EMAIL_ENTRY) {
                    setStatus('unconfigured');
                    return;
                }
                setStatus('sending');

                // Envío "fire and forget" a Google Forms vía un iframe oculto:
                // Google Forms no permite leer la respuesta por fetch (CORS),
                // pero sí acepta el POST normal de un <form target="iframe">,
                // que es la forma estándar de hacer esto sin backend propio.
                const form = document.createElement('form');
                form.action = NEWSLETTER_FORM_ACTION;
                form.method = 'POST';
                form.target = 'newsletter-iframe-target';
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = NEWSLETTER_EMAIL_ENTRY;
                input.value = email;
                form.appendChild(input);
                document.body.appendChild(form);
                form.submit();
                document.body.removeChild(form);

                setTimeout(() => {
                    setStatus('sent');
                    setEmail('');
                }, 600);
            };

            return (
                <div className="newsletter-box">
                    <iframe name="newsletter-iframe-target" style={{ display: 'none' }} title="newsletter-submit-target" />
                    <div className="newsletter-text">
                        <h3>Boletín semanal</h3>
                        <p>Un correo a la semana con los casos nuevos. Sin spam.</p>
                    </div>
                    {status === 'sent' ? (
                        <div className="newsletter-sent"><Icon name="check" size={16} /> Listo, ya estás suscrito.</div>
                    ) : (
                        <form className="newsletter-form" onSubmit={handleSubmit}>
                            <input
                                type="text"
                                name="company"
                                value={honeypot}
                                onChange={e => setHoneypot(e.target.value)}
                                style={{ position: 'absolute', left: '-9999px' }}
                                tabIndex="-1"
                                autoComplete="off"
                            />
                            <input
                                type="email"
                                className="newsletter-input"
                                placeholder="tu@correo.com"
                                value={email}
                                onChange={e => setEmail(e.target.value)}
                                required
                            />
                            <button type="submit" className="newsletter-btn" disabled={status === 'sending'}>
                                {status === 'sending' ? '...' : 'Suscribirme'}
                            </button>
                        </form>
                    )}
                    {status === 'error' && <div className="newsletter-error">Escribe un correo válido.</div>}
                    {status === 'unconfigured' && (
                        <div className="newsletter-error">El boletín aún no está activado (falta conectar el formulario).</div>
                    )}
                </div>
            );
        }

        function wrapCanvasText(ctx, text, maxWidth) {
            const words = text.split(' ');
            const lines = [];
            let current = '';
            words.forEach(word => {
                const test = current ? current + ' ' + word : word;
                if (ctx.measureText(test).width > maxWidth && current) {
                    lines.push(current);
                    current = word;
                } else {
                    current = test;
                }
            });
            if (current) lines.push(current);
            return lines;
        }

        // Polyfill for CanvasRenderingContext2D.roundRect — not available in
        // all browsers (notably older Safari/iOS versions still in use).
        function canvasRoundRect(ctx, x, y, w, h, r) {
            if (typeof ctx.roundRect === 'function') {
                ctx.roundRect(x, y, w, h, r);
                return;
            }
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        async function generateOfficialCardImage(official, maxScore) {
            // Don't let a slow/never-resolving font load block sharing forever.
            try {
                await Promise.race([
                    document.fonts.ready,
                    new Promise(resolve => setTimeout(resolve, 1200)),
                ]);
            } catch (e) { /* fonts may still work via fallback */ }

            const W = 1080, H = 1350;
            const canvas = document.createElement('canvas');
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');

            const total = getTotalScore(official.scores);
            const pct = total / maxScore;
            const color = getScoreColorHex(total);
            const strength = getSourceStrengthHex(official.sources.length);

            // Background
            ctx.fillStyle = '#06090F';
            ctx.fillRect(0, 0, W, H);

            // Top accent glow bar
            const grad = ctx.createLinearGradient(0, 0, 0, 8);
            grad.addColorStop(0, color);
            grad.addColorStop(1, '#06090F');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, 8);

            const M = 64; // margin

            // Logo — drawn as vector shapes, not an emoji glyph (font/platform
            // dependent and can render as a blank box on many systems).
            ctx.fillStyle = '#F85149';
            ctx.beginPath();
            canvasRoundRect(ctx, M, 56, 44, 44, 10);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            // simple balance-scale glyph: vertical post + horizontal beam + two pans
            const lx = M + 22, ly = 68, lw = 20;
            ctx.moveTo(lx, ly); ctx.lineTo(lx, ly + 18);
            ctx.moveTo(lx - lw / 2, ly); ctx.lineTo(lx + lw / 2, ly);
            ctx.moveTo(lx - lw / 2, ly); ctx.lineTo(lx - lw / 2, ly + 8);
            ctx.moveTo(lx + lw / 2, ly); ctx.lineTo(lx + lw / 2, ly + 8);
            ctx.stroke();

            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#E6EDF3';
            ctx.font = '700 30px "Space Grotesk", sans-serif';
            ctx.fillText('Corruptómetro', M + 60, 56 + 24);
            const w1 = ctx.measureText('Corruptómetro ').width;
            ctx.fillStyle = '#F85149';
            ctx.fillText('MX', M + 60 + w1, 56 + 24);

            // Name (wrapped)
            ctx.textBaseline = 'alphabetic';
            ctx.fillStyle = '#E6EDF3';
            ctx.font = '700 56px "Space Grotesk", sans-serif';
            const nameLines = wrapCanvasText(ctx, official.name, W - M * 2);
            let y = 220;
            nameLines.slice(0, 3).forEach(line => {
                ctx.fillText(line, M, y);
                y += 64;
            });

            // Role + state
            ctx.font = '26px "Inter", sans-serif';
            ctx.fillStyle = '#8B949E';
            const roleLines = wrapCanvasText(ctx, `${official.role} · ${official.state}`, W - M * 2);
            y += 10;
            roleLines.slice(0, 2).forEach(line => {
                ctx.fillText(line, M, y);
                y += 34;
            });

            // Status badge
            if (official.status === 'en_funciones' || official.status === 'candidato') {
                y += 20;
                const label = official.status === 'en_funciones' ? 'EN FUNCIONES' : 'CANDIDATO';
                const badgeColor = official.status === 'en_funciones' ? '#F85149' : '#D29922';
                ctx.font = '600 20px "JetBrains Mono", monospace';
                const tw = ctx.measureText(label).width;
                ctx.fillStyle = badgeColor + '26';
                ctx.beginPath();
                canvasRoundRect(ctx, M, y - 26, tw + 24, 36, 6);
                ctx.fill();
                ctx.fillStyle = badgeColor;
                ctx.fillText(label, M + 12, y);
                y += 55;
            }

            // Big score
            y += 130;
            ctx.font = '700 140px "Space Grotesk", sans-serif';
            ctx.fillStyle = color;
            ctx.fillText(String(total), M, y);
            const scoreW = ctx.measureText(String(total)).width;
            ctx.font = '400 44px "Space Grotesk", sans-serif';
            ctx.fillStyle = '#484F58';
            ctx.fillText(`/${maxScore}`, M + scoreW + 10, y);

            ctx.font = '600 28px "JetBrains Mono", monospace';
            ctx.fillStyle = color;
            ctx.fillText(getScoreLabel(total), M, y + 44);

            // Score bar
            const barY = y + 80;
            const barW = W - M * 2;
            ctx.fillStyle = '#1C2333';
            ctx.beginPath();
            canvasRoundRect(ctx, M, barY, barW, 14, 7);
            ctx.fill();
            ctx.fillStyle = color;
            ctx.beginPath();
            canvasRoundRect(ctx, M, barY, Math.max(barW * pct, 14), 14, 7);
            ctx.fill();

            // Top categories (up to 3 with highest score)
            const topCats = SCORING_CRITERIA
                .map(c => ({ ...c, val: official.scores[c.id] }))
                .filter(c => c.val > 0)
                .sort((a, b) => b.val - a.val)
                .slice(0, 3);

            let catY = barY + 70;
            ctx.font = '600 22px "Space Grotesk", sans-serif';
            ctx.fillStyle = '#8B949E';
            ctx.fillText('PRINCIPALES SEÑALAMIENTOS', M, catY);
            catY += 20;

            topCats.forEach(c => {
                catY += 44;
                const catColor = getScoreColorHex(c.val * (100 / c.maxPoints));
                ctx.fillStyle = catColor;
                ctx.beginPath();
                ctx.arc(M + 6, catY - 8, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '400 26px "Inter", sans-serif';
                ctx.fillStyle = '#E6EDF3';
                ctx.fillText(c.label, M + 26, catY);
                ctx.font = '600 24px "JetBrains Mono", monospace';
                ctx.fillStyle = catColor;
                ctx.textAlign = 'right';
                ctx.fillText(`${c.val}/${c.maxPoints}`, W - M, catY);
                ctx.textAlign = 'left';
            });

            // Footer
            const footY = H - 90;
            ctx.strokeStyle = '#21262D';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(M, footY - 30);
            ctx.lineTo(W - M, footY - 30);
            ctx.stroke();

            ctx.font = `600 22px "JetBrains Mono", monospace`;
            ctx.fillStyle = strength.color;
            ctx.fillText(`${official.sources.length} fuente${official.sources.length !== 1 ? 's' : ''} verificable${official.sources.length !== 1 ? 's' : ''}`, M, footY);

            ctx.font = '20px "JetBrains Mono", monospace';
            ctx.fillStyle = '#484F58';
            ctx.textAlign = 'right';
            ctx.fillText('ferrusca08.github.io/corruptometro-mx', W - M, footY);
            ctx.textAlign = 'left';

            return new Promise((resolve, reject) => {
                canvas.toBlob(blob => {
                    if (blob) resolve(blob);
                    else reject(new Error('canvas.toBlob devolvió null'));
                }, 'image/png');
            });
        }

        // Descarga la base de datos completa como JSON o CSV, generado en
        // el navegador del usuario, sin pasar por GitHub.
        function downloadOfficialsAs(format, officials) {
            const dateStr = new Date().toISOString().slice(0, 10);
            let blob, filename;

            if (format === 'json') {
                const payload = officials.map(o => ({
                    id: o.id, name: o.name, role: o.role, party: o.party,
                    state: o.state, level: o.level, status: o.status,
                    scores: o.scores, total: getTotalScore(o.scores),
                    lastVerified: o.lastVerified,
                    sources: o.sources.map(s => s.url),
                }));
                blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                filename = `corruptometro-mx_${dateStr}.json`;
            } else {
                const cols = ['id', 'name', 'role', 'party', 'state', 'level', 'status', 'total',
                    'sentencias', 'fiscalizacion', 'funcionarios', 'deuda', 'denuncias', 'evasion', 'nepotismo',
                    'lastVerified', 'num_sources'];
                const rows = officials.map(o => [
                    o.id, o.name, o.role, o.party, o.state, o.level, o.status, getTotalScore(o.scores),
                    o.scores.sentencias, o.scores.fiscalizacion, o.scores.funcionarios, o.scores.deuda,
                    o.scores.denuncias, o.scores.evasion, o.scores.nepotismo,
                    o.lastVerified || '', o.sources.length,
                ]);
                const esc = (v) => {
                    const s = String(v ?? '');
                    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
                };
                const csv = [cols.join(','), ...rows.map(r => r.map(esc).join(','))].join('\n');
                blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
                filename = `corruptometro-mx_${dateStr}.csv`;
            }

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function shareOfficialCard(official, maxScore, setStatus) {
            setStatus && setStatus('generando');

            const downloadBlob = (blob, filename) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            let blob;
            try {
                blob = await generateOfficialCardImage(official, maxScore);
            } catch (e) {
                console.error('Error generando la imagen de la ficha:', e);
                setStatus && setStatus('error');
                return;
            }

            const filename = `corruptometro-${official.name.toLowerCase().replace(/[^a-z0-9]+/g, '-')}.png`;

            // Try native share first (mobile), but never treat a user-cancelled
            // share as an error — and always fall back to a plain download if
            // the Share API itself fails for any other reason.
            if (navigator.share && navigator.canShare) {
                try {
                    const file = new File([blob], filename, { type: 'image/png' });
                    if (navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: `Corruptómetro MX — ${official.name}`,
                            text: `${official.name}: ${getTotalScore(official.scores)}/${maxScore} en el Corruptómetro MX`,
                        });
                        setStatus && setStatus('listo');
                        return;
                    }
                } catch (e) {
                    if (e && e.name === 'AbortError') {
                        // User closed the share sheet — not an error.
                        setStatus && setStatus('idle');
                        return;
                    }
                    console.warn('navigator.share falló, descargando en su lugar:', e);
                }
            }

            try {
                downloadBlob(blob, filename);
                setStatus && setStatus('descargado');
            } catch (e) {
                console.error('Error al descargar la ficha:', e);
                setStatus && setStatus('error');
            }
        }

        function OfficialCard({ official, rank, maxScore, expanded, onToggle }) {
            const total = official.total;
            const pct = (total / maxScore) * 100;
            const color = getScoreColor(total);
            const [shareStatus, setShareStatus] = React.useState('idle');
            const [speaking, setSpeaking] = React.useState(false);

            const handleShare = (e) => {
                e.stopPropagation();
                shareOfficialCard(official, maxScore, setShareStatus);
            };

            const handleSpeak = (e) => {
                e.stopPropagation();
                if (speaking) {
                    window.speechSynthesis.cancel();
                    setSpeaking(false);
                    return;
                }
                const ok = speakOfficial(official, () => setSpeaking(false));
                if (ok) setSpeaking(true);
            };

            return (
                <div className={`official-card ${expanded ? 'expanded' : ''}`}>
                    <div className="official-summary" onClick={onToggle}>
                        <div className={`rank ${rank <= 3 ? 'top-3' : ''}`}>
                            {String(rank).padStart(2, '0')}
                        </div>
                        <div className="official-info">
                            <h3>{official.name}</h3>
                            <div className="official-role">
                                {official.role} · {official.state}
                                {official.status === 'en_funciones' && (
                                    <span style={{
                                        marginLeft: '0.5rem',
                                        fontSize: '0.7rem',
                                        background: 'rgba(248, 81, 73, 0.15)',
                                        color: 'var(--corruption-critical)',
                                        padding: '0.1rem 0.4rem',
                                        borderRadius: '3px',
                                        fontFamily: 'var(--font-mono)',
                                    }}>EN FUNCIONES</span>
                                )}
                                {official.status === 'candidato' && (
                                    <span style={{
                                        marginLeft: '0.5rem',
                                        fontSize: '0.7rem',
                                        background: 'rgba(209, 154, 34, 0.15)',
                                        color: 'var(--corruption-medium)',
                                        padding: '0.1rem 0.4rem',
                                        borderRadius: '3px',
                                        fontFamily: 'var(--font-mono)',
                                    }}>CANDIDATO</span>
                                )}
                            </div>
                            <div className="official-meta">
                                {(() => {
                                    const strength = getSourceStrength(official.sources.length);
                                    return (
                                        <span className="source-strength" style={{ color: strength.color }} title={strength.label}>
                                            <span className="source-dots">
                                                {[1, 2, 3, 4].map(i => (
                                                    <span key={i} className={`source-dot ${i <= strength.dots ? 'filled' : ''}`} />
                                                ))}
                                            </span>
                                            {official.sources.length} fuente{official.sources.length !== 1 ? 's' : ''}
                                        </span>
                                    );
                                })()}
                                {official.lastVerified && (
                                    <span className="verified-date">
                                        <Icon name="check" size={11} /> verificado {formatDateEs(official.lastVerified)}
                                    </span>
                                )}
                            </div>
                        </div>
                        <div>
                            <span className={`official-party ${getPartyClass(official.party)}`}>
                                {official.party}
                            </span>
                        </div>
                        <div style={{ fontSize: '0.78rem', color: 'var(--text-secondary)' }}>
                            {official.level.charAt(0).toUpperCase() + official.level.slice(1)}
                        </div>
                        <div className="score-badge">
                            <Semaforo score={total} />
                            <div className="score-bar-bg">
                                <div className="score-bar-fill" style={{ width: `${pct}%`, background: color }} />
                            </div>
                            <div className="score-value" style={{ color }}>{total}</div>
                        </div>
                    </div>

                    {expanded && (
                        <div className="official-detail">
                            <div style={{ marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '1rem', flexWrap: 'wrap' }}>
                                <Semaforo score={total} size="lg" />
                                <span style={{
                                    fontFamily: 'var(--font-mono)',
                                    fontSize: '2rem',
                                    fontWeight: 700,
                                    color
                                }}>{total}/{maxScore}</span>
                                <span style={{
                                    fontFamily: 'var(--font-mono)',
                                    fontSize: '0.8rem',
                                    padding: '0.25rem 0.6rem',
                                    borderRadius: '4px',
                                    background: `${color}22`,
                                    color
                                }}>{getScoreLabel(total)}</span>
                                <InfoTip text="Este nivel describe cuánta evidencia documentada hay, no un veredicto de culpabilidad. Lee el desglose por categoría y sus fuentes abajo." />
                                {(() => {
                                    const strength = getSourceStrength(official.sources.length);
                                    return (
                                        <span style={{
                                            fontFamily: 'var(--font-mono)',
                                            fontSize: '0.8rem',
                                            padding: '0.25rem 0.6rem',
                                            borderRadius: '4px',
                                            background: `${strength.color}22`,
                                            color: strength.color,
                                        }}>
                                            {official.sources.length} fuente{official.sources.length !== 1 ? 's' : ''} · {strength.label}
                                        </span>
                                    );
                                })()}
                                {official.lastVerified && (
                                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: '0.78rem', color: 'var(--text-muted)' }}>
                                        Última verificación: {formatDateEs(official.lastVerified)}
                                    </span>
                                )}
                                <button
                                    onClick={handleSpeak}
                                    className="share-btn speak-btn"
                                >
                                    <Icon name={speaking ? 'volume-off' : 'volume'} size={14} />
                                    {speaking ? 'Detener' : 'Escuchar'}
                                </button>
                                <button
                                    onClick={handleShare}
                                    disabled={shareStatus === 'generando'}
                                    className="share-btn"
                                >
                                    {shareStatus === 'generando' ? 'Generando…' :
                                     shareStatus === 'descargado' ? <React.Fragment><Icon name="check" size={14} /> Descargado</React.Fragment> :
                                     shareStatus === 'listo' ? <React.Fragment><Icon name="check" size={14} /> Compartido</React.Fragment> :
                                     shareStatus === 'error' ? <React.Fragment><Icon name="alert-triangle" size={14} /> Reintentar</React.Fragment> :
                                     <React.Fragment><Icon name="share" size={14} /> Compartir ficha</React.Fragment>}
                                </button>
                            </div>

                            <div className="detail-grid">
                                <div className="detail-section">
                                    <h4>Desglose de puntuación</h4>
                                    {SCORING_CRITERIA.map(c => {
                                        const val = official.scores[c.id];
                                        const critPct = (val / c.maxPoints) * 100;
                                        return (
                                            <div className="breakdown-item" key={c.id}>
                                                <div className="breakdown-label">
                                                    <span>{c.label}<InfoTip text={c.desc} /></span>
                                                    <span style={{ color: getScoreColor(val * (100/c.maxPoints)) }}>
                                                        {val}/{c.maxPoints}
                                                    </span>
                                                </div>
                                                <div className="breakdown-bar">
                                                    <div
                                                        className="breakdown-fill"
                                                        style={{
                                                            width: `${critPct}%`,
                                                            background: getScoreColor(val * (100/c.maxPoints))
                                                        }}
                                                    />
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="detail-section">
                                    <h4>Evidencia por categoría</h4>
                                    {SCORING_CRITERIA.map(c => {
                                        const detail = official.breakdown[c.id];
                                        if (!detail) return null;
                                        return (
                                            <div className="detail-item" key={c.id} style={{ flexDirection: 'column', alignItems: 'flex-start', gap: '0.2rem' }}>
                                                <div className="detail-item-label" style={{ fontWeight: 500, color: 'var(--text-primary)', fontSize: '0.8rem' }}>
                                                    {c.label}
                                                </div>
                                                <div style={{ fontSize: '0.78rem', color: 'var(--text-secondary)', lineHeight: 1.6 }}>
                                                    {detail}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {official.timeline && official.timeline.length > 0 && (
                                <div className="timeline">
                                    <h4 style={{ fontFamily: 'var(--font-display)', fontSize: '0.85rem', fontWeight: 600, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '0.5rem' }}>
                                        Línea de tiempo
                                    </h4>
                                    {official.timeline.map((evt, i) => (
                                        <div className="timeline-event" key={i}>
                                            <div className="timeline-year">{evt.year}</div>
                                            <div className="timeline-desc">{evt.event}</div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {official.sources && official.sources.length > 0 && (
                                <div className="sources">
                                    <h4>Fuentes verificables</h4>
                                    {official.sources.map((src, i) => (
                                        <a key={i} href={src.url} className="source-link" target="_blank" rel="noopener">
                                            [{i + 1}] {src.label} ↗
                                        </a>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // =====================================================
        // RENDER
        // =====================================================
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
